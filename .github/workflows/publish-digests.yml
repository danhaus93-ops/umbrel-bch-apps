name: Publish image digests

# The Umbrel store requires images pinned as tag@sha256-digest. The packages
# REST API needs a classic PAT and ghcr.io is unreachable from some tooling
# environments -- but from inside Actions, GITHUB_TOKEN can read this repo's
# own packages. Dump name -> {digest, tags} for every image we publish into
# image-digests.json on master so any environment can pin via the contents API.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build app images", "Build bchn-sv2-bridge", "Build BCH Explorer images", "Build lonestrike-sv2-pool"]
    types: [completed]

permissions:
  contents: write
  packages: read

jobs:
  digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          IMAGES="bchn-dashboard solostrike-cash-dashboard asicseer-pool cash-sv2-pool bchn-sv2-bridge fulcrum-info bch-explorer-frontend bch-explorer-backend"
          echo '{' > image-digests.json
          first=1
          for img in $IMAGES; do
            resp=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/users/danhaus93-ops/packages/container/${img}/versions?per_page=5" || true)
            row=$(echo "$resp" | python3 -c '
import json,sys
try:
    vs=json.load(sys.stdin)
    assert isinstance(vs,list) and vs
except Exception:
    print("null"); raise SystemExit
best=None
for v in vs:
    tags=v.get("metadata",{}).get("container",{}).get("tags",[])
    if tags:
        best={"digest":v["name"],"tags":tags}; break
print(json.dumps(best) if best else "null")')
            [ $first -eq 1 ] || echo ',' >> image-digests.json
            first=0
            printf '  "%s": %s' "$img" "$row" >> image-digests.json
          done
          echo '' >> image-digests.json
          echo '}' >> image-digests.json
          python3 -m json.tool image-digests.json
      - name: Commit
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@github.com"
          git add image-digests.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "image-digests.json: refresh [skip ci]"
          git push
