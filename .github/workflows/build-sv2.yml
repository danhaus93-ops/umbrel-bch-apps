name: Build SV2 images
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'sv2/**', '.github/workflows/build-sv2.yml' ]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./sv2/bridge
            image: bchn-sv2-bridge
          - context: ./sv2/pool
            image: lonestrike-sv2-pool
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/danhaus93-ops/${{ matrix.image }}:latest
            ghcr.io/danhaus93-ops/${{ matrix.image }}:${{ github.sha }}
