name: Build dashboard image

# Builds the multi-arch (amd64 + arm64) dashboard image and pushes it to
# GitHub Container Registry. Umbrel runs on both architectures, so both are required.
#
# Trigger by pushing a tag like  v1.0.0  (matches the image tag used in docker-compose.yml).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bchn-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE }}:latest
