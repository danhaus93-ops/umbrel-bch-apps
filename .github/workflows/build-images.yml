name: Build app images

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'sslabs-solostrike-cash/dashboard/**'
      - 'sslabs-solostrike-cash/pool/**'
      - 'sslabs-fulcrum/web/**'
      - 'dashboard/**'
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./dashboard
            image: bchn-dashboard
          - context: ./sslabs-solostrike-cash/dashboard
            image: solostrike-cash-dashboard
          - context: ./sslabs-solostrike-cash/pool
            image: asicseer-pool
          - context: ./sslabs-fulcrum/web
            image: fulcrum-info
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/danhaus93-ops/${{ matrix.image }}:latest
            ghcr.io/danhaus93-ops/${{ matrix.image }}:${{ github.sha }}
