name: SV2 telemetry regression suite
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths: [ 'sslabs-solostrike-cash/dashboard/**', 'tests/sv2-telemetry/**', 'sv2/bridge/**' ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bash tests/sv2-telemetry/run.sh
