name: Bitcoin Cash Explorer
version: "3.11.22"
icon: https://raw.githubusercontent.com/danhaus93-ops/umbrel-bch-apps/master/sslabs-bch-explorer/icon.svg
tagline: A mempool-style block explorer for your own Bitcoin Cash node
description: >-
  A self-hosted Bitcoin Cash block explorer in the familiar mempool style —
  live mempool and fee visualizations, block and transaction pages, and address
  lookups, all served from hardware you control instead of a public website.


  It reads blocks and transactions from your Bitcoin Cash Node and resolves
  address history through your Fulcrum server, so your lookups stay private.


  Requires the Bitcoin Cash Node and Fulcrum (BCH) apps. On first run it builds
  its own database and indexes chain history — this takes a while and uses extra
  disk before the explorer is fully populated.


  Built on the open-source Bitcoin Cash Explorer (a Bitcoin Cash fork of mempool).

  Donations are never expected — but if SoloStrike Labs apps are useful to you, they keep development going: bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
