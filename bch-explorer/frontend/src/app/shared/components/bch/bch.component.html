<span *ngIf="valueOverride !== undefined">{{ valueOverride }}</span>
<span *ngIf="valueOverride === undefined"
  >&lrm;{{ addPlus && satoshis >= 0 ? "+" : "" }}{{ value | number }}
</span>
<span class="symbol">
  <ng-template [ngIf]="network === 'testnet4' || network === 'scalenet'"
    >t-</ng-template
  >
  <ng-template [ngIf]="network === 'chipnet'">c-</ng-template>{{ unit }}
</span>
