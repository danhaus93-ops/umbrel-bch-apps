<div
  class="container p-lg-0 pb-0"
  style="max-width: 100%; margin-top: 7px"
  *ngIf="storageService.getValue('hideWarning') !== 'hidden'"
>
  <div class="alert alert-danger mb-0 text-center">
    <div class="message-container">
      <span i18n="warning-testnet"
        >This is a test network. Coins have no value.</span
      >
    </div>
    <button
      type="button"
      class="btn-close"
      (click)="dismissWarning()"
      aria-label="Dismiss warning"
    ></button>
  </div>
</div>
