<app-indexing-progress></app-indexing-progress>

<div class="full-container">
  <div class="card-header mb-0 mb-md-4">
    <div class="d-flex d-md-block align-items-baseline">
      <span i18n="mining.asert-deviation">Difficulty Adjustment Deviation</span>
      <button
        class="btn p-0 ps-2"
        style="margin: 0 0 4px 0px"
        (click)="onSaveChart()"
        aria-label="Download chart"
      >
        <fa-icon [icon]="['fas', 'download']" [fixedWidth]="true"></fa-icon>
      </button>
    </div>
    <div class="text-muted small mt-2">
      Shows the relative (normalized) deviation from baseline (first block in
      the current time period).
    </div>

    <form
      [formGroup]="radioGroupForm"
      class="formRadioGroup"
      *ngIf="statsObservable$ | async as stats"
    >
      <div class="btn-group" role="group" name="radioBasic">
        <ng-container *ngIf="stats.blockCount >= 144">
          <input
            type="radio"
            class="btn-check"
            id="asert-24h"
            [value]="'24h'"
            fragment="24h"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-24h">24h</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 432">
          <input
            type="radio"
            class="btn-check"
            id="asert-3d"
            [value]="'3d'"
            fragment="3d"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-3d">3D</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 1008">
          <input
            type="radio"
            class="btn-check"
            id="asert-1w"
            [value]="'1w'"
            fragment="1w"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-1w">1W</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 4320">
          <input
            type="radio"
            class="btn-check"
            id="asert-1m"
            [value]="'1m'"
            fragment="1m"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-1m">1M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 12960">
          <input
            type="radio"
            class="btn-check"
            id="asert-3m"
            [value]="'3m'"
            fragment="3m"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-3m">3M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 25920">
          <input
            type="radio"
            class="btn-check"
            id="asert-6m"
            [value]="'6m'"
            fragment="6m"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-6m">6M</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 52560">
          <input
            type="radio"
            class="btn-check"
            id="asert-1y"
            [value]="'1y'"
            fragment="1y"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-1y">1Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 105120">
          <input
            type="radio"
            class="btn-check"
            id="asert-2y"
            [value]="'2y'"
            fragment="2y"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-2y">2Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 157680">
          <input
            type="radio"
            class="btn-check"
            id="asert-3y"
            [value]="'3y'"
            fragment="3y"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-3y">3Y</label>
        </ng-container>
        <ng-container *ngIf="stats.blockCount >= 200640">
          <input
            type="radio"
            class="btn-check"
            id="asert-4y"
            [value]="'4y'"
            fragment="4y"
            [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
            formControlName="dateSpan"
          />
          <label class="btn btn-purple btn-sm" for="asert-4y">4Y</label>
        </ng-container>
        <input
          type="radio"
          class="btn-check"
          id="asert-all"
          [value]="'all'"
          fragment="all"
          [routerLink]="['/graphs/mining/asert-deviation' | relativeUrl]"
          formControlName="dateSpan"
        />
        <label class="btn btn-purple btn-sm" for="asert-all">ALL</label>
      </div>
    </form>
  </div>

  <div class="chart" *browserOnly>
    <app-asert-deviation-graph
      [data]="asertData"
      (chartInit)="onChartInit($event)"
      (chartOptionsChange)="onChartOptionsChange($event)"
      [style]="{ opacity: isLoading ? 0.5 : 1 }"
    ></app-asert-deviation-graph>
  </div>
  <div
    class="text-center loadingGraphs"
    *ngIf="!stateService.isBrowser || isLoading"
  >
    <div class="spinner-border text-light"></div>
  </div>
</div>
