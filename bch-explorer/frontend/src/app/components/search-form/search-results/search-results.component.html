<div
  class="dropdown-menu show"
  *ngIf="results"
  [hidden]="
    !results.hashQuickMatch &&
    !results.otherNetworks.length &&
    !results.addresses.length &&
    !results.pools.length &&
    !results.tokenCategory
  "
>
  <ng-template [ngIf]="results.blockHeight">
    <div class="card-title" i18n="search.bitcoin-block-height">
      {{ networkName }} Block Height
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="goTo; context: { $implicit: results.searchText }"
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.dateTime">
    <div class="card-title" i18n="search.bitcoin-block-date">Date</div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="goTo; context: { $implicit: results.searchText }"
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.unixTimestamp">
    <div class="card-title" i18n="search.bitcoin-block-timestamp">
      Timestamp
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="goTo; context: { $implicit: results.searchText }"
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.txId">
    <div class="card-title" i18n="search.bitcoin-transaction">
      {{ networkName }} Transaction
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="
          goTo;
          context: { $implicit: results.searchText | shortenString: 13 }
        "
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.tokenCategory">
    <div class="card-title" i18n="search.bitcoin-cashtoken">
      {{ networkName }} CashToken
    </div>
    <button
      (click)="
        clickItem(
          results.hashQuickMatch +
            results.addresses.length +
            results.pools.length +
            results.otherNetworks.length
        )
      "
      [class.active]="
        results.hashQuickMatch +
          results.addresses.length +
          results.pools.length +
          results.otherNetworks.length ===
        activeIdx
      "
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="
          goTo;
          context: { $implicit: results.searchText | shortenString: 13 }
        "
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.address && !results.publicKey">
    <div class="card-title" i18n="search.bitcoin-address">
      {{ networkName }} Address
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="
          goTo;
          context: {
            $implicit: results.searchText | shortenString: (isMobile ? 17 : 30),
          }
        "
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.blockHash">
    <div class="card-title" i18n="search.bitcoin-block">
      {{ networkName }} Block
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="
          goTo;
          context: { $implicit: results.searchText | shortenString: 13 }
        "
      ></ng-container>
    </button>
  </ng-template>
  <ng-template [ngIf]="results.addresses.length">
    <div class="card-title" i18n="search.bitcoin-addresses">
      {{ networkName }} Addresses
    </div>
    <ng-template ngFor [ngForOf]="results.addresses" let-address let-i="index">
      <button
        (click)="clickItem(results.hashQuickMatch + i)"
        [class.active]="results.hashQuickMatch + i === activeIdx"
        type="button"
        role="option"
        class="dropdown-item"
      >
        <ngb-highlight
          [result]="address | shortenString: (isMobile ? 25 : 36)"
          [term]="results.searchText"
        ></ngb-highlight>
      </button>
    </ng-template>
  </ng-template>
  <ng-template [ngIf]="results.pools.length">
    <div class="card-title" i18n="search.mining-pools">Mining Pools</div>
    <ng-template ngFor [ngForOf]="results.pools" let-pool let-i="index">
      <button
        (click)="
          clickItem(results.hashQuickMatch + results.addresses.length + i)
        "
        [class.active]="
          results.hashQuickMatch + results.addresses.length + i === activeIdx
        "
        [class.inactive]="!pool.active"
        type="button"
        role="option"
        class="dropdown-item"
      >
        <app-mining-pool
          [slug]="pool.slug"
          [name]="pool.name"
          [searchText]="results.searchText"
          [logoStyle]="'margin-right:10px;'"
        ></app-mining-pool>
      </button>
    </ng-template>
  </ng-template>
  <ng-template [ngIf]="results.otherNetworks.length">
    <div class="card-title danger" i18n="search.other-networks">
      Other Network Address
    </div>
    <ng-template
      ngFor
      [ngForOf]="results.otherNetworks"
      let-otherNetwork
      let-i="index"
    >
      <button
        (click)="
          clickItem(
            results.hashQuickMatch +
              results.addresses.length +
              results.pools.length +
              i
          )
        "
        [class.active]="
          results.hashQuickMatch +
            results.addresses.length +
            results.pools.length +
            i ===
          activeIdx
        "
        [class.inactive]="!otherNetwork.isNetworkAvailable"
        type="button"
        role="option"
        class="dropdown-item"
      >
        <ng-container
          *ngTemplateOutlet="
            goTo;
            context: {
              $implicit:
                otherNetwork.address | shortenString: (isMobile ? 12 : 20),
            }
          "
        ></ng-container
        >&nbsp;<b
          >({{
            otherNetwork.network.charAt(0).toUpperCase() +
              otherNetwork.network.slice(1)
          }})</b
        >
      </button>
    </ng-template>
  </ng-template>
  <ng-template [ngIf]="results.address && results.publicKey">
    <div class="card-title" i18n="search.bitcoin-address">
      {{ networkName }} Address
    </div>
    <button
      (click)="clickItem(0)"
      [class.active]="0 === activeIdx"
      type="button"
      role="option"
      class="dropdown-item"
    >
      <ng-container
        *ngTemplateOutlet="
          goTo;
          context: {
            $implicit: results.searchText | shortenString: (isMobile ? 17 : 30),
          }
        "
      ></ng-container>
    </button>
  </ng-template>
</div>

<ng-template #goTo let-x i18n="search.go-to">Go to "{{ x }}"</ng-template>
