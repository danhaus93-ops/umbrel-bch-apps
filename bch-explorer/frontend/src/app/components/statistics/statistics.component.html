<div class="container-graph">
  <div>
    <div>
      <div class="card mb-3">
        <div class="card-header">
          <div class="d-flex d-md-block align-items-baseline">
            <span i18n="statistics.memory-by-Bytes"
              >Mempool by Bytes (sat/Byte)</span
            >
            <button
              class="btn p-0 ps-2"
              style="margin: 0 0 4px 0px"
              (click)="onSaveChart('mempool')"
              aria-label="Download mempool chart"
            >
              <fa-icon
                [icon]="['fas', 'download']"
                [fixedWidth]="true"
              ></fa-icon>
            </button>
          </div>

          <form
            [formGroup]="radioGroupForm"
            class="formRadioGroup"
            [class]="stateService.env.MINING_DASHBOARD ? 'mining' : 'no-menu'"
            (click)="saveGraphPreference()"
          >
            <div class="small-buttons">
              <a
                class="btn btn-purple btn-sm mb-0"
                [routerLink]="['/clock/mempool/0' | relativeUrl]"
                style="color: var(--fg)"
                id="btn-clock"
              >
                <fa-icon
                  [icon]="['fas', 'clock']"
                  [fixedWidth]="true"
                  i18n-title="master-page.clockview"
                  i18n-title="footer.clock-mempool"
                  title="Clock (Mempool)"
                ></fa-icon>
              </a>
            </div>
            <div class="btn-toggle-rows" name="radioBasic">
              <div class="btn-group" role="group">
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-2h"
                  [value]="'2h'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="2h"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-2h"
                  >2H (LIVE)</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-24h"
                  [value]="'24h'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="24h"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-24h">24H</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-3d"
                  [value]="'3d'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="3d"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-3d">3D</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-1w"
                  [value]="'1w'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="1w"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-1w">1W</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-1m"
                  [value]="'1m'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="1m"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-1m">1M</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-3m"
                  [value]="'3m'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="3m"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-3m">3M</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-6m"
                  [value]="'6m'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="6m"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-6m">6M</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-1y"
                  [value]="'1y'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="1y"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-1y">1Y</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-2y"
                  [value]="'2y'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="2y"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-2y">2Y</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-3y"
                  [value]="'3y'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="3y"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-3y">3Y</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-4y"
                  [value]="'4y'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="4y"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-4y">4Y</label>
                <input
                  type="radio"
                  class="btn-check"
                  id="stats-all"
                  [value]="'all'"
                  [routerLink]="['/graphs' | relativeUrl]"
                  fragment="all"
                  formControlName="dateSpan"
                />
                <label class="btn btn-purple btn-sm" for="stats-all"
                  ><span i18n="all">All</span></label
                >
              </div>
            </div>
            <div class="small-buttons">
              <div ngbDropdown #myDrop="ngbDropdown">
                <button
                  class="btn btn btn-purple btn-sm"
                  id="dropdownFees"
                  ngbDropdownAnchor
                  (click)="myDrop.toggle()"
                  aria-label="Filter fees"
                >
                  <fa-icon
                    [icon]="['fas', 'filter']"
                    [fixedWidth]="true"
                    i18n-title="statistics.component-filter.title"
                    title="Filter"
                  ></fa-icon>
                </button>
                <div
                  class="dropdown-fees"
                  ngbDropdownMenu
                  aria-labelledby="dropdownFees"
                >
                  <ul>
                    <li
                      (click)="this.showCount = !this.showCount"
                      [class]="this.showCount ? '' : 'inactive'"
                    >
                      <span
                        class="square"
                        [ngStyle]="{ backgroundColor: 'white' }"
                      ></span>
                      <span class="fee-text">{{ titleCount }}</span>
                    </li>
                    <hr style="margin: 4px" />
                    <ng-template
                      ngFor
                      let-feeData
                      let-i="index"
                      [ngForOf]="feeLevelDropdownData"
                    >
                      <ng-template [ngIf]="feeData.fee <= 400">
                        <li
                          (click)="filterFeeIndex = feeData.fee"
                          [class]="
                            filterFeeIndex > feeData.fee ? 'inactive' : ''
                          "
                        >
                          <span
                            class="square"
                            [ngStyle]="{ backgroundColor: feeData.color }"
                          ></span>
                          <span class="fee-text">{{ feeData.range }}</span>
                        </li>
                      </ng-template>
                    </ng-template>
                  </ul>
                </div>
              </div>

              <button
                (click)="invertGraph()"
                class="btn btn btn-purple btn-sm"
                aria-label="Invert graph"
              >
                <fa-icon
                  [icon]="['fas', 'exchange-alt']"
                  [rotate]="90"
                  [fixedWidth]="true"
                  i18n-title="statistics.component-invert.title"
                  title="Invert"
                ></fa-icon>
              </button>
            </div>
          </form>
        </div>
        <div class="card-body">
          <div class="incoming-transactions-graph">
            <app-mempool-graph
              #mempoolgraph
              dir="ltr"
              [template]="'advanced'"
              [hideCount]="!showCount"
              [limitFilterFee]="filterFeeIndex"
              [height]="500"
              [left]="65"
              [right]="showCount ? 50 : 10"
              [data]="mempoolStats && mempoolStats.length ? mempoolStats : null"
              [isLoading]="isLoading"
            ></app-mempool-graph>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="card mb-3">
        <div class="card-header">
          <div class="bytes-title">
            <div>
              <span i18n="statistics.transaction-bytes-per-second"
                >Transaction Bytes per second (B/s)</span
              >
              <button
                class="btn p-0 ps-2"
                style="margin: 0 0 4px 0px"
                (click)="onSaveChart('incoming')"
                aria-label="Download transaction bytes chart"
              >
                <fa-icon
                  [icon]="['fas', 'download']"
                  [fixedWidth]="true"
                ></fa-icon>
              </button>
            </div>
            <div class="form-check">
              <input
                style="margin-top: 9px"
                class="form-check-input"
                type="checkbox"
                [checked]="outlierCappingEnabled"
                id="hide-outliers"
                (change)="onOutlierToggleChange($event)"
              />
              <label class="form-check-label" for="hide-outliers">
                <small i18n="statistics.cap-outliers">Cap outliers</small>
              </label>
            </div>
          </div>
        </div>

        <div class="card-body">
          <div class="incoming-transactions-graph">
            <app-incoming-transactions-graph
              #incominggraph
              [height]="500"
              [left]="65"
              [template]="'advanced'"
              [data]="mempoolTransactionsPerSecondData"
              [outlierCappingEnabled]="outlierCappingEnabled"
              [isLoading]="isLoading"
            ></app-incoming-transactions-graph>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
