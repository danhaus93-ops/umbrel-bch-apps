<ng-container *ngIf="{ val: network$ | async } as network">
  <header *ngIf="headerVisible" class="sticky-header">
    <nav class="navbar navbar-expand-md navbar-dark">
      <!-- Hamburger -->
      <!-- <ng-container *ngIf="servicesEnabled">
        <div
          *ngIf="user"
          class="profile_image_container"
          (click)="hamburgerClick($event)"
        >
          <img
            [src]="'/api/v1/services/account/images/' + user.username"
            class="profile_image"
            onError="this.src = '/resources/anon.svg'; this.className = 'anon'"
          />
        </div>
        <div
          *ngIf="false && user === null"
          class="profile_image_container"
          (click)="hamburgerClick($event)"
        >
          <app-svg-images name="hamburger" height="40"></app-svg-images>
        </div>
        <div *ngIf="user === undefined" class="profile_image_container"></div>
      </ng-container> -->

      <!-- Large screen -->
      <a
        class="navbar-brand d-none d-md-flex"
        [ngClass]="{ 'dual-logos': enterpriseInfo?.dualLogo }"
        [routerLink]="['/' | relativeUrl]"
        (click)="brandClick($event)"
        aria-label="Bitcoin Cash Explorer - Home"
      >
        <ng-container
          *ngIf="{ val: connectionState$ | async } as connectionState"
        >
          <app-svg-images
            name="bchExplorer"
            viewBox="0 0 678 112"
            class="bch-explorer-logo"
            [ngStyle]="{ opacity: connectionState.val === 2 ? 1 : 0.5 }"
          ></app-svg-images>
          <div class="connection-badge">
            <div
              class="badge bg-warning"
              *ngIf="connectionState.val === 0"
              i18n="master-page.offline"
            >
              Offline
            </div>
            <div
              class="badge bg-warning"
              *ngIf="connectionState.val === 1"
              i18n="master-page.reconnecting"
            >
              Reconnecting...
            </div>
          </div>
        </ng-container>
      </a>
      <!-- Mobile -->
      <a
        class="navbar-brand d-flex d-md-none justify-content-center"
        [ngClass]="{
          'dual-logos': enterpriseInfo?.dualLogo,
          'me-0': enterpriseInfo?.dualLogo,
        }"
        [routerLink]="['/' | relativeUrl]"
        (click)="brandClick($event)"
        aria-label="Bitcoin Cash Explorer - Home"
      >
        <ng-container
          *ngIf="{ val: connectionState$ | async } as connectionState"
        >
          <!-- TODO: Smaller logo for mobile -->
          <app-svg-images
            name="bchExplorer"
            viewBox="0 0 678 112"
            class="bch-explorer-logo"
            [ngStyle]="{ opacity: connectionState.val === 2 ? 1 : 0.5 }"
          ></app-svg-images>
          <div class="connection-badge">
            <div
              class="badge bg-warning"
              *ngIf="connectionState.val === 0"
              i18n="master-page.offline"
            >
              Offline
            </div>
            <div
              class="badge bg-warning"
              *ngIf="connectionState.val === 1"
              i18n="master-page.reconnecting"
            >
              Reconnecting...
            </div>
          </div>
        </ng-container>
      </a>

      <div
        (window:resize)="onResize()"
        ngbDropdown
        class="dropdown-container"
        *ngIf="isDropdownVisible"
      >
        <button
          ngbDropdownToggle
          type="button"
          class="btn btn-secondary dropdown-toggle-split d-flex justify-content-center align-items-center"
          aria-haspopup="true"
          aria-label="Select network"
        >
          <app-svg-images
            class="d-flex justify-content-center align-items-center current-network-svg"
            [name]="network.val === '' ? 'bitcoin' : network.val"
            width="20"
            height="20"
            viewBox="0 0 65 65"
          ></app-svg-images>
        </button>
        <div ngbDropdownMenu [ngClass]="{ 'dropdown-menu-end': isMobile }">
          <a
            ngbDropdownItem
            *ngIf="env.MAINNET_ENABLED"
            class="mainnet"
            [routerLink]="networkPaths['mainnet'] || '/'"
            ><app-svg-images
              name="bitcoin"
              width="22"
              height="22"
              viewBox="0 0 65 65"
              style="width: 25px; height: 25px"
              class="mainnet me-1"
            ></app-svg-images>
            Mainnet</a
          >
          <a
            ngbDropdownItem
            *ngIf="env.SCALENET_ENABLED"
            class="scalenet"
            [class.active]="network.val === 'scalenet'"
            [routerLink]="networkPaths['scalenet'] || '/scalenet'"
            ><app-svg-images
              name="scalenet"
              width="22"
              height="22"
              viewBox="0 0 65 65"
              style="width: 25px; height: 25px"
              class="mainnet me-1"
            ></app-svg-images>
            Scalenet</a
          >
          <a
            ngbDropdownItem
            *ngIf="env.CHIPNET_ENABLED"
            class="chipnet"
            [class.active]="network.val === 'chipnet'"
            [routerLink]="networkPaths['chipnet'] || '/chipnet'"
            ><app-svg-images
              name="chipnet"
              width="22"
              height="22"
              viewBox="0 0 65 65"
              style="width: 25px; height: 25px"
              class="mainnet me-1"
            ></app-svg-images>
            Chipnet</a
          >
          <a
            ngbDropdownItem
            *ngIf="env.TESTNET4_ENABLED"
            class="testnet4"
            [class.active]="network.val === 'testnet4'"
            [routerLink]="networkPaths['testnet4'] || '/testnet4'"
            ><app-svg-images
              name="testnet4"
              width="22"
              height="22"
              viewBox="0 0 65 65"
              style="width: 25px; height: 25px"
              class="mainnet me-1"
            ></app-svg-images>
            Testnet4</a
          >
        </div>
      </div>

      <div class="navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav {{ network.val }}">
          <li
            class="nav-item"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            id="btn-home"
          >
            <a
              class="nav-link"
              [routerLink]="['/' | relativeUrl]"
              (click)="collapse()"
              aria-label="Home"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-tachometer"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li
            class="nav-item mining"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            id="btn-pools"
            *ngIf="stateService.env.MINING_DASHBOARD"
          >
            <a
              class="nav-link"
              [routerLink]="['/mining' | relativeUrl]"
              (click)="collapse()"
              aria-label="Mining Dashboard"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-pickaxe"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li class="nav-item" routerLinkActive="active" id="btn-blocks">
            <a
              class="nav-link"
              [routerLink]="['/blocks' | relativeUrl]"
              (click)="collapse()"
              aria-label="Block list"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-cubes"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li class="nav-item" routerLinkActive="active" id="btn-graphs">
            <a
              class="nav-link"
              [routerLink]="['/graphs' | relativeUrl]"
              (click)="collapse()"
              aria-label="Graphs"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-chart-area"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li
            class="nav-item"
            routerLinkActive="active"
            id="btn-faucet"
            *ngIf="
              stateService.isofficialBCHExplorerSiteBuild &&
              stateService.env.OFFICIAL_BCH_EXPLORER &&
              stateService.network === 'testnet4'
            "
          >
            <a
              class="nav-link"
              [routerLink]="['/faucet' | relativeUrl]"
              (click)="collapse()"
              aria-label="Faucet"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-faucet-drip"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li
            class="nav-item"
            routerLinkActive="active"
            id="btn-docs"
            *ngIf="!isOfficialSiteBuild"
          >
            <a
              class="nav-link"
              [routerLink]="['/docs' | relativeUrl]"
              (click)="collapse()"
              aria-label="Documentation"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-book"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
          <li class="nav-item" routerLinkActive="active" id="btn-about">
            <a
              class="nav-link"
              [routerLink]="['/about']"
              (click)="collapse()"
              aria-label="About"
            >
              <div class="svg-wrapper">
                <app-svg-images
                  name="nav-info-circle"
                  width="21.59"
                  height="100%"
                ></app-svg-images>
              </div>
            </a>
          </li>
        </ul>
        <app-search-form
          [hamburgerOpen]="enterpriseInfo === null && user != null"
          class="search-form-container"
          location="top"
          (searchTriggered)="collapse()"
        ></app-search-form>
      </div>
    </nav>
    <!-- <app-menu
      *ngIf="servicesEnabled"
      [navOpen]="menuOpen"
      (loggedOut)="onLoggedOut()"
      (menuToggled)="menuToggled($event)"
    ></app-menu> -->
  </header>

  <div class="d-flex" style="overflow: clip">
    <div class="empty-sidenav">
      <!-- empty sidenav needed to push footer down the screen -->
    </div>

    <div class="flex-grow-1 d-flex flex-column">
      <app-notification></app-notification>
      <app-testnet-alert
        *ngIf="
          network.val === 'testnet4' ||
          network.val === 'scalenet' ||
          network.val === 'chipnet'
        "
      ></app-testnet-alert>

      <main style="min-width: 375px; max-width: 100vw">
        <router-outlet></router-outlet>
      </main>

      <div class="flex-grow-1"></div>
      <app-global-footer
        *ngIf="footerVisible"
        [user]="user"
      ></app-global-footer>
    </div>
  </div>
</ng-container>
