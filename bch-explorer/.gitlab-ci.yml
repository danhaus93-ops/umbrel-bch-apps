default:
  image: registry.melroy.org/melroy/docker-images/rust:1.95-node-24.15.0

variables:
  GHCR_USERNAME: melroy89
  GHCR_ORG: bitcoincash1
  GHCR_REGISTRY: ghcr.io

.cache_backend_template: &cache_backend_definition
  cache:
    key:
      files:
        - backend/pnpm-lock.yaml
        - rust/gbt/Cargo.lock
    paths:
      # pnpm
      - backend/.pnpm-store
      # cargo
      - .cargo

.cache_frontend_template: &cache_frontend_definition
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/.pnpm-store

workflow:
  auto_cancel:
    on_new_commit: interruptible

stages:
  - test
  - build
  - deploy

lint-format-test-backend:
  stage: test
  <<: *cache_backend_definition
  interruptible: true
  script:
    - cd backend
    - mkdir rust-gbt # Placeholder directory (if pnpm install is triggered during preinstall)
    - pnpm preinstall
    # pnpm v11 caches install state here; deleting it forces re-linking of the freshly built rust-gbt binary.
    - rm -rf node_modules/.pnpm-workspace-state-v1.json
    - pnpm install --prefer-offline --prefer-frozen-lockfile
    #- pnpm run lint
    - pnpm prettier:check
    - pnpm test

#test-frontend:
