# REFERENCE ONLY — this file is NOT mounted anywhere.
# The live config is generated by the init service in docker-compose.yml.
# Fulcrum configuration — split into its own Umbrel app.
# Fulcrum auto-detects the coin (BCH) from the node it connects to.

datadir = /data

# Cross-app: reach the node app's bitcoind container by its full name.
bitcoind = sslabs-bitcoin-cash-node_bitcoind_1:8332
rpcuser = bchn
rpcpassword = bchn_local_rpc_pw_2f9c   # MUST match the node's -rpcpassword

# Electrum endpoints. SSL is what real wallets use.
tcp = 0.0.0.0:50021
ssl = 0.0.0.0:50022

# Self-signed cert/key — the cculianu/fulcrum entrypoint generates these on
# first run if missing, at exactly these paths.
cert = /data/fulcrum.crt
key  = /data/fulcrum.key

peering  = false
announce = false

# Lightweight stats endpoint (index height, etc).
stats = 0.0.0.0:8081

# Tuning.
db_max_open_files  = 200
bitcoind_timeout   = 600
bitcoind_clients   = 1
worker_threads     = 1
