services:
  app_proxy:
    environment:
      APP_HOST: sslabs-fulcrum_web_1
      APP_PORT: 80

  # Writes fulcrum.conf into the data volume with this install's RPC password.
  init:
    image: alpine:3.20
    restart: "no"
    environment:
      RPC_PASS: bchn_local_rpc_pw_2f9c
    volumes:
      - ${APP_DATA_DIR}/data/fulcrum:/data
    command:
      - sh
      - -c
      - |
        cat > /data/fulcrum.conf <<CONF
        datadir = /data
        bitcoind = sslabs-bitcoin-cash-node_bitcoind_1:8332
        rpcuser = bchn
        rpcpassword = $${RPC_PASS}
        tcp = 0.0.0.0:50021
        ssl = 0.0.0.0:50022
        cert = /data/fulcrum.crt
        key  = /data/fulcrum.key
        peering  = false
        announce = false
        stats = 0.0.0.0:8081
        db_mem             = 1024
        fast-sync          = 1024
        db_max_open_files  = 200
        bitcoind_timeout   = 600
        bitcoind_clients   = 1
        worker_threads     = 1
        CONF

  fulcrum:
    image: cculianu/fulcrum:latest
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${APP_DATA_DIR}/data/fulcrum:/data
    command:
      - sh
      - -c
      - |
        mkfifo /tmp/logpipe 2>/dev/null || true
        ( while IFS= read -r l; do
            printf '%s\n' "$$l"
            case "$$l" in
              *"Processed height: "*)
                h="$${l#*Processed height: }"
                printf '%s' "$${h%%,*}" > /data/progress.txt
                ;;
              *"Block height "*", up-to-date"*)
                h="$${l#*Block height }"
                printf '%s' "$${h%%,*}" > /data/progress.txt
                ;;
            esac
          done < /tmp/logpipe ) &
        trap 'kill -TERM "$$FPID" 2>/dev/null' TERM INT
        Fulcrum /data/fulcrum.conf > /tmp/logpipe 2>&1 &
        FPID=$$!
        wait "$$FPID"
    ports:
      - 50021:50021   # Electrum TCP
      - 50022:50022   # Electrum SSL

  web:
    image: ghcr.io/danhaus93-ops/fulcrum-info:latest
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/fulcrum:/fdata:ro
    depends_on:
      - fulcrum
