server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # latest indexed height, tapped from Fulcrum's own log (always available)
  location = /progress {
    alias /fdata/progress.txt;
    default_type text/plain;
    add_header Cache-Control no-store;
  }

  # chain tip straight from the node (always responsive)
  location = /tip {
    resolver 127.0.0.11 valid=10s;
    set $node_upstream http://sslabs-bitcoin-cash-node_bitcoind_1:8332;
    proxy_pass $node_upstream/;
    proxy_method POST;
    proxy_set_header Authorization "Basic YmNobjpiY2huX2xvY2FsX3JwY19wd18yZjlj";
    proxy_set_header Content-Type application/json;
    proxy_set_body '{"jsonrpc":"1.0","id":"tip","method":"getblockcount","params":[]}';
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
  }

  location /stats {
    resolver 127.0.0.11 valid=10s;
    set $fulcrum_upstream http://fulcrum:8081;
    proxy_pass $fulcrum_upstream/stats;
    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;
  }
}
