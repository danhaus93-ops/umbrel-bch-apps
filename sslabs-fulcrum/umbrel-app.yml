category: networking
name: Fulcrum (BCH)
version: "1.3.6"
icon: https://raw.githubusercontent.com/danhaus93-ops/umbrel-bch-apps/master/sslabs-fulcrum/icon.svg
tagline: Electrum server for your Bitcoin Cash node — connect your wallet
description: >-
  Fulcrum is a fast Electrum server for Bitcoin Cash. It indexes your own node
  so wallets like Electron Cash and Sparrow connect privately to hardware you
  control instead of a stranger's server.


  Requires the Bitcoin Cash Node app. The first index build takes a while and
  uses extra disk; once done, point your wallet at the endpoints shown in the app.

  Donations are never expected — but if LoneStrike Labs apps are useful to you, they keep development going: qpp8hg2n60mhhlsr2apw6l60x5vrdq0vp5pq3j4gyt
releaseNotes: >-
  Corrects the donation address shown in the app description to a Bitcoin
  Cash address (it previously showed a BTC address).
