tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run Bitcoin Cash on your own terms. Bitcoin Cash Node (BCHN) — the
  professional, miner-friendly BCH full node — validates every block and
  transaction independently and exposes JSON-RPC + ZMQ on your local network.


  This is the node only. For wallet connectivity install Fulcrum (BCH); to
  solo-mine install LoneStrike Cash. Both are in this store and depend on this node.


  First sync downloads the full chain, so use an SSD (NVMe strongly recommended).

  Donations are never expected — but if LoneStrike Labs apps are useful to you, they keep development going: bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
