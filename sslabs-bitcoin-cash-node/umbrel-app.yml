manifestVersion: 1
id: sslabs-bitcoin-cash-node
category: networking
name: Bitcoin Cash Node
version: "29.1.34"
icon: https://raw.githubusercontent.com/danhaus93-ops/umbrel-bch-apps/master/sslabs-bitcoin-cash-node/icon.svg
tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run Bitcoin Cash on your own terms. Bitcoin Cash Node (BCHN) — the
  professional, miner-friendly BCH full node — validates every block and
  transaction independently and exposes JSON-RPC + ZMQ on your local network.


  This is the node only. For wallet connectivity install Fulcrum (BCH); to
  solo-mine install LoneStrike Cash. Both are in this store and depend on this node.


  First sync downloads the full chain, so use an SSD (NVMe strongly recommended).

  Donations are never expected — but if LoneStrike Labs apps are useful to you, they keep development going: qpp8hg2n60mhhlsr2apw6l60x5vrdq0vp5pq3j4gyt
releaseNotes: >-
  Backups are now sensible. Previously a backup of this app tried to include
  the entire blockchain - hundreds of gigabytes of data your node can simply
  re-download. Backups now keep what actually matters and cannot be
  regenerated: your settings (including Tor mode and onion peers), your
  blocked-peer list, and your node's onion service identity, while skipping
  the chain data and logs.
developer: LoneStrike Labs
website: https://bitcoincashnode.org
dependencies: []
repo: https://github.com/danhaus93-ops/umbrel-bch-apps
support: https://github.com/danhaus93-ops/umbrel-bch-apps/issues
port: 3330
gallery: []
path: ""
backupIgnore:
  - "data/bitcoind/blocks"
  - "data/bitcoind/chainstate"
  - "data/bitcoind/indexes"
  - "data/bitcoind/debug.log"
