tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run Bitcoin Cash on your own terms. Bitcoin Cash Node (BCHN) — the
  professional, miner-friendly BCH full node — validates every block and
  transaction independently and exposes JSON-RPC + ZMQ on your local network.


  This is the node only. For wallet connectivity install Fulcrum (BCH); to
  solo-mine install LoneStrike Cash. Both are in this store and depend on this node.


  First sync downloads the full chain, so use an SSD (NVMe strongly recommended).

  Donations are never expected — but if LoneStrike Labs apps are useful to you, they keep development going: bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
releaseNotes: >-
  Disconnect now actually keeps a peer away. The previous attempt did not work,
  and this explains why.

  Your node keeps a target number of outbound connections and refills a free slot
  within about half a second, choosing from peers it already knows — and one it
  just dropped is a prime candidate. So disconnecting a peer could never hold on
  its own.

  Disconnect now also blocks the peer, which is the only thing that stops your node
  dialling it again, and it withdraws the standing request to keep onion peers
  connected. Both are needed: each one alone leaves a path open.

  Because this genuinely blocks a peer rather than nudging it, there is now a
  Blocked list under Peers with an Allow button for each one. Nothing is blocked
  without you tapping Disconnect, and nothing stays blocked once you allow it.
