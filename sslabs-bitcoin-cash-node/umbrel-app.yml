tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run Bitcoin Cash on your own terms. Bitcoin Cash Node (BCHN) — the
  professional, miner-friendly BCH full node — validates every block and
  transaction independently and exposes JSON-RPC + ZMQ on your local network.


  This is the node only. For wallet connectivity install Fulcrum (BCH); to
  solo-mine install LoneStrike Cash. Both are in this store and depend on this node.


  First sync downloads the full chain, so use an SSD (NVMe strongly recommended).

  Donations are never expected — but if LoneStrike Labs apps are useful to you, they keep development going: bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
releaseNotes: >-
  The node status page now opens with a rotating globe of your peers instead of a
  percentage ring, with a Connections breakdown of clearnet vs Tor and the latest
  blocks beneath it.

  Peers are located on your own machine. The country table is built into the app
  image, so no peer address ever leaves your node — asking a web service where
  your peers are would hand whoever runs it a map of everyone you talk to.

  Tor peers have no location at all, by design; they orbit the centre marker
  rather than being hidden. A peer whose country can't be determined is shown as
  unplaced rather than guessed.

  Each peer row now has a Disconnect button. It asks your node to drop that
  connection once — it is not a ban, and your node may reconnect later.

  IP-to-country data by DB-IP (db-ip.com), CC BY 4.0.
