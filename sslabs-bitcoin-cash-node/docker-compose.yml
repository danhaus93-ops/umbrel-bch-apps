# Bitcoin Cash Node (node only) for Umbrel
# Fulcrum is now its own app (sslabs-fulcrum). ZMQ added for LoneStrike Cash.
services:
  app_proxy:
    environment:
      APP_HOST: sslabs-bitcoin-cash-node_web_1
      APP_PORT: 3000

  tor:
    # 0.4.7.8 (Aug 2022) is EOL and can no longer bootstrap: its directory
    # authority list is stale, so dir servers answer 404 "Consensus not signed
    # by sufficient number of requested authorities" and Tor sticks at 30%.
    # Pinned by digest to the same image the official Umbrel apps ship.
    image: ghcr.io/getumbrel/tor:0.4.9.11@sha256:e382b8629c0dfef6ceb396b062622d4e4e955b19d6f16b883fd2c0723ad5671a
    # NO `user:` here. Upstream's apps run tor as 1000:1000 because their
    # data/tor was 1000-owned from first install. Ours was created by a root
    # tor container years ago, so adding a uid means tor cannot write its own
    # DataDirectory (/data, per torrc): the container crash-loops under
    # restart: on-failure and Tor stays silently broken -- on the very release
    # whose purpose is fixing Tor. Nothing depends_on tor, so the app itself
    # still starts, which is what makes the failure quiet. Root has written
    # this directory for three years; keep it that way.
    restart: on-failure
    environment:
      HOME: /tmp
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${APP_DATA_DIR}/data/tor:/data
    networks:
      default:
        ipv4_address: ${APP_SSLABS_BITCOIN_CASH_NODE_TOR_IP}

  bitcoind:
    image: mainnet/bitcoin-cash-node:v29.0.0@sha256:5144a579369cbab859119b04c86e4e078cf8ef830a1cb721be96bdc0b7498a35
    restart: always
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/bitcoind:/data
    entrypoint: ["bitcoind"]
    command:
      - -datadir=/data
      - -printtoconsole
      - -server=1
      - -listen=1
      - -port=8335
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=bchn
      - -rpcpassword=bchn_local_rpc_pw_2f9c
      - -rpcworkqueue=512
      - -rpcthreads=64          # default is 4 — plenty of headroom, idle threads are nearly free
      - -dbcache=512
      - -maxmempool=300
      - -txindex=1
      - -disablewallet=1
      - -maxconnections=64
      - -zmqpubhashblock=tcp://0.0.0.0:28332   # for LoneStrike Cash (lowest-latency)
    ports:
      - 8335:8335   # BCH P2P — forward this on your router for clearnet inbound peers

  web:
    image: ghcr.io/danhaus93-ops/bchn-dashboard:latest
    restart: on-failure
    user: "0:0"
    volumes:
      - ${APP_DATA_DIR}/data/bitcoind:/nodedata
    depends_on:
      - bitcoind
    environment:
      PORT: 3000
      APP_VERSION: v29.1.20
      TOR_IP: ${APP_SSLABS_BITCOIN_CASH_NODE_TOR_IP}
      RPC_HOST: bitcoind
      RPC_PORT: "8332"
      RPC_USER: bchn
      RPC_PASS: bchn_local_rpc_pw_2f9c
      PUBLIC_HOST: ${DEVICE_DOMAIN_NAME}
