tagline: Run your own Bitcoin Cash full node and Electrum server
description: >-
  Run Bitcoin Cash on your own terms. This app pairs Bitcoin Cash Node (BCHN) —
  the professional, miner-friendly BCH full node — with Fulcrum, a fast Electrum
  server, so your wallets connect directly to hardware you control.


  Independently validate every Bitcoin Cash block and transaction instead of
  trusting someone else's server. Point Electron Cash, Sparrow, or any
  Electrum-compatible wallet at your node for full privacy: your wallet provider
  can't see your addresses or balances, and can't feed you a false view of the
  chain. Solo miners and apps can also connect over JSON-RPC on your local
  network.


  The built-in dashboard shows sync progress, peers, mempool, and the exact
  connection strings to paste into your wallet.


  First sync downloads the full chain and builds the Electrum index, so allow
  plenty of time and use an SSD — an NVMe drive is strongly recommended.
releaseNotes: >-
  Initial release. Bitcoin Cash Node 28 + Fulcrum, with a status dashboard and
  one-tap wallet connection strings.
