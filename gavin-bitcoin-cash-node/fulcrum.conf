# Fulcrum configuration for the Bitcoin Cash Node Umbrel app.
# Fulcrum auto-detects the coin (BCH) from the node it connects to.

datadir = /data

# Talk to the BCHN daemon over the app's internal network.
bitcoind = bitcoind:8332
rpcuser = bchn
rpcpassword = bchn_local_rpc_pw_2f9c   # MUST match -rpcpassword in docker-compose.yml

# Electrum endpoints. SSL is what real wallets use.
tcp = 0.0.0.0:50021
ssl = 0.0.0.0:50022

# Self-signed cert/key. The cculianu/fulcrum entrypoint generates these on first
# run if they are missing, at exactly these paths.
cert = /data/fulcrum.crt
key  = /data/fulcrum.key

# Don't act as a public peer on the Electrum network — this is a personal server.
peering  = false
announce = false

# Lightweight stats endpoint the dashboard reads for index height.
stats = 0.0.0.0:8081

# Tuning. Lower db_mem / fast-sync on a Raspberry Pi with limited RAM.
fast-sync          = 1024
db_max_open_files  = 200
bitcoind_timeout   = 600
bitcoind_clients   = 1
worker_threads     = 1
