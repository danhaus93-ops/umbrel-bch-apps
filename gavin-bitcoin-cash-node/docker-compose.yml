# Bitcoin Cash Node (node only) for Umbrel
# Fulcrum is now its own app (gavin-fulcrum). ZMQ added for SoloStrike Cash.
services:
  app_proxy:
    environment:
      APP_HOST: gavin-bitcoin-cash-node_web_1
      APP_PORT: 3000

  bitcoind:
    image: zquestz/bitcoin-cash-node:29.0.0
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/bitcoind:/data
    command:
      - bitcoind
      - -datadir=/data
      - -printtoconsole
      - -server=1
      - -listen=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=bchn
      - -rpcpassword=bchn_local_rpc_pw_2f9c
      - -rpcworkqueue=512
      - -dbcache=512
      - -maxmempool=300
      - -txindex=1
      - -zmqpubhashblock=tcp://0.0.0.0:28332   # for SoloStrike Cash (lowest-latency)

  web:
    image: ghcr.io/danhaus93-ops/bchn-dashboard:latest
    restart: on-failure
    depends_on:
      - bitcoind
    environment:
      PORT: 3000
      RPC_HOST: bitcoind
      RPC_PORT: "8332"
      RPC_USER: bchn
      RPC_PASS: bchn_local_rpc_pw_2f9c
      PUBLIC_HOST: ${DEVICE_DOMAIN_NAME}
